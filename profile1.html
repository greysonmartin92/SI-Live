<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greyson Martin | Profile</title>
    <style>
        body { background-color: #0e0e10; color: #efeff1; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Main Column */
        #main-column { flex: 3; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        #image-box { width: 100%; max-width: 800px; height: 450px; background: #18181b; border: 2px solid #333; display: flex; align-items: center; justify-content: center; }
        #image-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        #about-me { max-width: 800px; margin-top: 20px; padding: 20px; background: #1f1f23; border-radius: 8px; }
        
        /* Chat Column */
        #chat-column { flex: 1; background: #18181b; border-left: 1px solid #333; display: flex; flex-direction: column; min-width: 300px; }
        .chat-header { padding: 15px; border-bottom: 1px solid #333; font-weight: bold; text-align: center; color: #bf94ff; }
        #chat-messages { padding: 15px; flex-grow: 1; overflow-y: auto; font-size: 0.9em; display: flex; flex-direction: column; gap: 10px; }
        .message { line-height: 1.4; }
        .user { color: #a2e817; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-column">
    <h1>Greyson Martin</h1>
    <div id="image-box">
        <!-- Replace with your actual photo -->
        <img src="https://via.placeholder.com/800x450?text=Profile+Photo" alt="Profile Visual">
    </div>
    
    <div id="about-me">
        <h2>About Me</h2>
        <p>Computer Science student transitioning into Geology at UT Arlington. Exploring the intersection of machine learning and earth sciences.</p>
    </div>
</div>

<div id="chat-column">
    <div class="chat-header">LIVE CHAT</div>
    <div id="chat-messages">
        <div class="message"><span class="user">GeoFan99:</span> Welcome to the stream!</div>
    </div>
</div>

<script>
    const punMessages = [
        "You rock!",
        "That sample is gneiss.",
        "Don't take geology for granite.",
        "I'm feeling sedimental today.",
        "That mineral is boulder than the rest.",
        "Geologists have a lot of grit.",
        "Talk schist to me!",
        "Solid as a rock!",
        "This profile is crystal clear."
    ];

    const viewers = ["GeoFan99", "RockHound_TX", "CrystalClear", "SedimentSam", "StoneCold", "FaultLine"];

    function addPun() {
        const chat = document.getElementById('chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        
        const randomUser = viewers[Math.floor(Math.random() * viewers.length)];
        const randomPun = punMessages[Math.floor(Math.random() * punMessages.length)];
        
        messageDiv.innerHTML = `<span class="user">${randomUser}:</span> ${randomPun}`;
        chat.appendChild(messageDiv);
        chat.scrollTop = chat.scrollHeight;
        
        if (chat.children.length > 15) {
            chat.removeChild(chat.firstChild);
        }
    }

    setInterval(addPun, 3000);
</script>

</body>
</html>
